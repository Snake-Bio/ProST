data:
  dataset: BRCA
  k_cutoff: 6
  top_genes: 2000
mode: clustering
model:
  latent_dim: 16
  p_drop: 0.2
  project_dim: 32
  mask_rate: 0.6
  replace_rate: 0.1
  margin: 0
  power: 2
  use_prompt_pool: true
  prompt_inject_mode: add
  prompt_pool_size: 16
  prompt_top_k: 3
  prompt_temperature: 2.0
seed: 24
train:
  decay: 0.001
  epochs: 100
  gradient_clipping: 5.0
  lr: 0.001
  w_recon: 1.5
  w_match: 0.3